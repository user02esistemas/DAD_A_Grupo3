<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overo's Restaurant Campestre</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/estilos.css">
    <style>
        body {
            background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 50%, #40916C 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .hero-icon { font-size: 64px; margin-bottom: 16px; animation: pulse 2s infinite; }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            margin-bottom: 8px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .hero p { font-size: 16px; opacity: 0.85; margin-bottom: 48px; }
        .options { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
        .option-card {
            width: 260px; height: 280px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none; color: white;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .option-card:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .option-card i { font-size: 56px; margin-bottom: 20px; }
        .option-card h2 { font-size: 22px; margin-bottom: 6px; font-family: 'Playfair Display', serif; }
        .option-card p { font-size: 13px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="hero fade-in">
        <div class="hero-icon"><i class="fa-solid fa-utensils"></i></div>
        <h1>Overo's Restaurant</h1>
        <p>Sistema de Gestion Restaurante - Arquitectura RMI</p>

        <div class="options">
            <a href="mozoLogin.jsp" class="option-card">
                <i class="fa-solid fa-clipboard-list"></i>
                <h2>Mozo</h2>
                <p>Tomar pedidos y mesas</p>
            </a>
            <a href="mozoLogin.jsp?rol=cocina" class="option-card">
                <i class="fa-solid fa-fire-burner"></i>
                <h2>Cocina</h2>
                <p>Pedidos en tiempo real</p>
            </a>
            <a href="#" class="option-card" onclick="alert('Escanea el QR de tu mesa para acceder al menú'); return false;">
                <i class="fa-solid fa-qrcode"></i>
                <h2>Cliente</h2>
                <p>Escanea el QR de tu mesa</p>
            </a>
            <a href="#" class="option-card" style="opacity:0.5;" onclick="alert('Administración disponible solo en la aplicación de escritorio'); return false;">
                <i class="fa-solid fa-user-shield"></i>
                <h2>Admin (Escritorio)</h2>
                <p>Gestión desde la app de escritorio</p>
            </a>
        </div>
    </div>
</body>
</html>
